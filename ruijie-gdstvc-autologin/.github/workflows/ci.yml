name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare symlinks
        run: |
          rm -f ruijie_student.sh ruijie_teacher.sh
          ln -s ruijie.sh ruijie_student.sh
          ln -s ruijie.sh ruijie_teacher.sh

      - name: Run shellcheck on all scripts
        run: |
          for f in *.sh lib/*.sh tests/*.sh; do
            if [ -f "$f" ]; then
              # 仅检查错误级别 (SC1xxx)，忽略警告和信息
              shellcheck -s bash -x -S error "$f" || exit 1
            fi
          done

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x ruijie.sh lib/*.sh tests/*.sh
          # 创建符号链接（向后兼容）
          rm -f ruijie_student.sh ruijie_teacher.sh
          ln -s ruijie.sh ruijie_student.sh
          ln -s ruijie.sh ruijie_teacher.sh

      - name: Unit tests (含扩展单元测试)
        run: bash tests/run_tests.sh unit

      - name: Integration tests
        run: bash tests/run_tests.sh integration
