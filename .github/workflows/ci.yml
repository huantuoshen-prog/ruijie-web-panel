name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on all scripts
        run: |
          for f in *.sh api/*.sh init.d/* tests/*.sh; do
            if [ -f "$f" ]; then
              shellcheck -s bash -x -S error "$f" || exit 1
            fi
          done

  api-contract:
    name: API Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run web panel tests
        run: bash tests/run_tests.sh

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Verify committed dist matches build output
        run: git diff --exit-code -- dist

      - name: Smoke check dist and docs
        run: |
          test -f dist/index.html
          test -f dist/app.js
          test -f dist/app.css
          test -f dist/favicon.ico
          test -f docs/install.md
          test -f docs/usage.md
          test -f docs/api.md
          test -f docs/troubleshooting.md
          test -f docs/development.md
          grep -q './docs/install.md' README.md
          grep -q './docs/api.md' README.md
          grep -q '/ruijie-cgi/status' docs/api.md
          grep -q '/ruijie-cgi/account' docs/api.md
          grep -q '/ruijie-cgi/settings' docs/api.md
          grep -q '/ruijie-cgi/log' docs/api.md
          grep -q '/ruijie-cgi/health' docs/api.md
          grep -q '/ruijie-cgi/health-log' docs/api.md
          grep -q '/ruijie-cgi/runtime' docs/api.md
